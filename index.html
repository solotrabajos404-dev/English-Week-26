<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Week 2026 - Kids Adventure</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Nunito', sans-serif; scroll-behavior: smooth; background-color: #F0F9FF; overflow-x: hidden; }
        .font-kids { font-family: 'Fredoka', sans-serif; }

        /* Custom Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes rainbow {
            0% { color: #ff0000; }
            20% { color: #ffcc00; }
            40% { color: #33cc33; }
            60% { color: #0066ff; }
            80% { color: #9900cc; }
            100% { color: #ff0000; }
        }

        .floating { animation: float 4s ease-in-out infinite; }
        .bouncy { animation: bounce-slow 2s ease-in-out infinite; }
        .rainbow-text { animation: rainbow 5s linear infinite; }

        /* Card Styles */
        .kid-card {
            background: white;
            border-radius: 4rem;
            padding: 3rem;
            box-shadow: 0 25px 0 rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
            text-align: center;
        }
        .kid-card:hover {
            transform: translateY(15px);
            box-shadow: 0 10px 0 rgba(0,0,0,0.04);
            border-color: #4DA8DA;
        }

        .day-btn.active {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .wave-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            line-height: 0;
        }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <header class="relative h-screen flex items-center justify-center p-6 text-center overflow-hidden bg-[#0D3B66]">
        <!-- Animated Background Doodles -->
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute top-[10%] left-[10%] text-8xl bouncy">🎈</div>
            <div class="absolute top-[20%] right-[10%] text-9xl floating" style="animation-delay: 1s;">🚀</div>
            <div class="absolute bottom-[20%] left-[5%] text-7xl floating">🍭</div>
            <div class="absolute bottom-[10%] right-[5%] text-[12rem] bouncy" style="animation-delay: 0.5s;">🦖</div>
            <div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 text-[40vw] font-black text-white/[0.03] select-none">
                FUN
            </div>
        </div>

        <div class="relative z-10 max-w-5xl">
            <div class="inline-block px-10 py-5 bg-yellow-400 rounded-full shadow-[0_10px_0_#ca8a04] transform -rotate-3 mb-8 bouncy">
                <span class="text-[#0D3B66] font-black text-2xl md:text-3xl uppercase tracking-widest font-kids">Juan D. Arosemena School</span>
            </div>

            <h1 class="text-7xl md:text-[11rem] font-black leading-none mb-6 tracking-tighter text-white drop-shadow-[0_15px_0_#1a4b84]">
                ENGLISH<br/>
                <span class="text-yellow-300 italic">WEEK!</span>
            </h1>

            <p class="text-2xl md:text-5xl font-black text-cyan-300 mb-12 uppercase tracking-widest drop-shadow-md bouncy">
                🌟 Let's Play & Learn! 🌟
            </p>

            <button onclick="document.getElementById('nav-section').scrollIntoView({behavior: 'smooth'})" 
                    class="bg-white text-[#1a4b84] px-16 py-8 rounded-[3rem] font-black text-4xl hover:scale-110 transition-all shadow-[0_15px_0_#cbd5e1] active:translate-y-2 active:shadow-none font-kids">
                PLAY NOW! 🏁
            </button>
        </div>

        <div class="wave-container">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none" style="display: block; width: 100%; height: 80px; fill: #F0F9FF;">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"></path>
            </svg>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav id="nav-section" class="sticky top-0 z-50 py-10 px-4 bg-white/90 backdrop-blur-2xl border-b-8 border-yellow-400 shadow-xl">
        <div class="flex justify-center gap-6 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="updateSchedule('Monday')" id="btn-Monday" class="day-btn active bg-gradient-to-br from-pink-400 to-rose-500 text-white px-12 py-6 rounded-[2.5rem] text-2xl font-black transition-all">MONDAY</button>
            <button onclick="updateSchedule('Tuesday')" id="btn-Tuesday" class="day-btn bg-white text-slate-400 border-4 border-slate-100 px-12 py-6 rounded-[2.5rem] text-2xl font-black transition-all">TUESDAY</button>
            <button onclick="updateSchedule('Wednesday')" id="btn-Wednesday" class="day-btn bg-white text-slate-400 border-4 border-slate-100 px-12 py-6 rounded-[2.5rem] text-2xl font-black transition-all">WEDNESDAY</button>
            <button onclick="updateSchedule('Thursday')" id="btn-Thursday" class="day-btn bg-white text-slate-400 border-4 border-slate-100 px-12 py-6 rounded-[2.5rem] text-2xl font-black transition-all">THURSDAY</button>
        </div>
    </nav>

    <main class="container mx-auto px-6 max-w-7xl mt-24 mb-32">
        <div class="text-center mb-24">
            <h2 id="current-title" class="inline-block px-14 py-10 rounded-[4rem] text-5xl md:text-8xl font-black text-white bg-gradient-to-r from-pink-400 to-rose-500 shadow-2xl transform rotate-1">
                Opening Day Magic! 🎊
            </h2>
        </div>

        <div id="cards-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-12">
            <!-- Content will be injected by JS -->
        </div>

        <!-- MASCOT SECTION -->
        <section class="mt-40 bg-[#1a4b84] rounded-[6rem] p-16 md:p-24 text-white relative shadow-2xl border-b-[25px] border-[#0D3B66]">
             <div class="flex flex-col md:flex-row items-center gap-16 relative z-10 text-center md:text-left">
                <div class="text-[15rem] bouncy">🦁</div>
                <div class="flex-1">
                   <h3 class="text-6xl font-black mb-8 text-yellow-300 uppercase italic">Roar with Joy!</h3>
                   <p class="text-3xl font-bold leading-relaxed text-blue-50">
                      "Hello adventurers! Every activity is a magic door to a new word. Let's make this the best English Week ever!"
                   </p>
                </div>
             </div>
        </section>
    </main>

    <footer class="py-24 text-center bg-[#0D3B66] text-white">
        <div class="flex justify-center gap-10 text-7xl mb-12">
            <span class="bouncy">🎨</span><span class="bouncy" style="animation-delay: 0.2s">⭐</span><span class="bouncy" style="animation-delay: 0.4s">🎮</span>
        </div>
        <h4 class="text-3xl font-black uppercase text-yellow-400 font-kids">CEB Juan D. Arosemena</h4>
    </footer>

    <script>
        const data = {
            'Monday': {
                title: "Opening Day Magic! 🎊",
                gradient: "from-pink-400 to-rose-500",
                events: [
                    { icon: '🎭', name: 'Opening Ceremony', loc: 'Main Stage', desc: 'The grand start!' },
                    { icon: '⭐', name: 'Opening Activities', loc: 'School Yard', desc: 'Welcome surprises!' },
                    { icon: '❌⭕', name: 'Tic-Tac-Toe Game', loc: 'Playground', desc: 'Fun logic games' },
                    { icon: '💃', name: 'Dance Performance', loc: 'Theater', desc: 'Watch us shake!' },
                    { icon: '⚽', name: 'Ball Control Show', loc: 'Gym', desc: 'Amazing football tricks' },
                    { icon: '🎵', name: 'Song Presentation', loc: 'Main Stage', desc: 'Singing together' },
                    { icon: '🐝', name: 'Spelling Bee', loc: 'Library', desc: 'Spelling fun!' }
                ]
            },
            'Tuesday': {
                title: "Trivia Adventure! 💡",
                gradient: "from-yellow-400 to-orange-500",
                events: [
                    { icon: '🧠', name: 'Trivia Time', loc: 'Classrooms', desc: 'Show what you know!' },
                    { icon: '🤫', name: 'Whisper Game', loc: 'Hallways', desc: 'Tell a secret!' }
                ]
            },
            'Wednesday': {
                title: "Word Power Day! 🧩",
                gradient: "from-cyan-400 to-blue-500",
                events: [
                    { icon: '🎲', name: 'Bingo Word', loc: 'Main Hall', desc: 'Shout BINGO!' },
                    { icon: '🔍', name: 'Memory Challenge', loc: 'Science Lab', desc: 'Find the pairs!' },
                    { icon: '📝', name: 'Unscramble Sentences', loc: 'English Lab', desc: 'Solve word puzzles' },
                    { icon: '🏆', name: 'Spelling Bee Finals', loc: 'Auditorium', desc: 'The big champion!' },
                    { icon: '🌐', name: 'Wordwall Games', loc: 'PC Room', desc: 'Science fun!' }
                ]
            },
            'Thursday': {
                title: "Grand Party Expo! 🥳",
                gradient: "from-purple-400 to-indigo-500",
                events: [
                    { icon: '👯', name: 'TWINS DAY', loc: 'Everywhere', desc: 'Dress like your friend!' },
                    { icon: '🎬', name: 'Musical & Drama', loc: 'Theater', desc: 'Stories come alive' },
                    { icon: '👨‍🍳', name: 'Kitchen Chemistry', loc: 'Kitchen Lab', desc: 'Yummy science' },
                    { icon: '🗣️', name: 'Speech Contest', loc: 'Library', desc: 'Little speakers' },
                    { icon: '🧪', name: 'Science Exhibition', loc: 'Science Lab', desc: 'Bugs and Lights' },
                    { icon: '⚡', name: 'Electrostatics Expo', loc: 'Hall', desc: 'Hair raising fun' },
                    { icon: '🇵🇹', name: 'Portugal Culture', loc: 'Square', desc: 'Poems and more' },
                    { icon: '✨', name: 'Closing Activities', loc: 'Main Stage', desc: 'The big goodbye' }
                ]
            }
        };

        function updateSchedule(day) {
            const current = data[day];

            // Update Title
            const titleEl = document.getElementById('current-title');
            titleEl.innerText = current.title;
            titleEl.className = `inline-block px-14 py-10 rounded-[4rem] text-5xl md:text-8xl font-black text-white bg-gradient-to-r ${current.gradient} shadow-2xl transform rotate-1`;

            // Update Nav Buttons
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.className = "day-btn bg-white text-slate-400 border-4 border-slate-100 px-12 py-6 rounded-[2.5rem] text-2xl font-black transition-all";
            });
            const activeBtn = document.getElementById(`btn-${day}`);
            activeBtn.className = `day-btn active bg-gradient-to-br ${current.gradient} text-white px-12 py-6 rounded-[2.5rem] text-2xl font-black transition-all`;

            // Update Cards
            const container = document.getElementById('cards-container');
            container.innerHTML = current.events.map(ev => `
                <div class="kid-card group relative overflow-hidden">
                    <div class="absolute top-0 left-10 right-10 h-4 bg-gradient-to-r ${current.gradient} rounded-b-full"></div>
                    <div class="text-[9em] mb-10 bouncy group-hover:scale-110 transition-transform">${ev.icon}</div>
                    <h3 class="text-4xl font-black text-[#1a4b84] mb-4">${ev.name}</h3>
                    <p class="text-slate-500 font-bold text-xl mb-10 italic">"${ev.desc}"</p>
                    <div class="inline-flex items-center gap-3 px-8 py-4 rounded-3xl font-black text-white bg-[#0D3B66] text-lg uppercase">
                        📍 ${ev.loc}
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        updateSchedule('Monday');
    </script>
</body>
</html>
