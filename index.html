<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Week 2026 - Passport to the World</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            scroll-behavior: smooth; 
            background-color: #E0F2FE; 
            overflow-x: hidden; 
        }
        .font-kids { font-family: 'Fredoka', sans-serif; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-40px) rotate(5deg); }
        }
        @keyframes bounce-slow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .floating { animation: float 6s ease-in-out infinite; }
        .bouncy { animation: bounce-slow 3s ease-in-out infinite; }

        .ticket-card {
            background: white;
            border-radius: 3rem;
            padding: 2.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #f8fafc;
            position: relative;
            text-align: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .ticket-card::before, .ticket-card::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 40px;
            background-color: #E0F2FE;
            border-radius: 50%;
            transform: translateY(-50%);
        }
        .ticket-card::before { left: -20px; }
        .ticket-card::after { right: -20px; }

        .ticket-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 0 rgba(29, 78, 216, 0.1);
        }

        /* Twins Special Styling */
        .twins-link-card {
            cursor: pointer;
            border: 4px solid #f472b6;
        }
        .twins-image-container {
            width: 100%;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 4px solid #facc15;
            margin-bottom: 1rem;
        }

        .nav-stamp {
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }
        .nav-stamp.active {
            transform: scale(1.1) rotate(2deg);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .sound-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 100;
            background: #facc15;
            padding: 1rem;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <button class="sound-btn" onclick="toggleMusic()" id="musicBtn">🔇</button>

    <!-- HERO -->
    <header class="relative h-screen flex items-center justify-center p-6 text-center overflow-hidden bg-[#1D4ED8]">
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute top-[15%] left-[15%] text-7xl floating">✈️</div>
            <div class="absolute top-[25%] right-[15%] text-9xl floating" style="animation-delay: 1s;">🌍</div>
            <div class="absolute bottom-[25%] left-[10%] text-8xl bouncy">🛂</div>
            <div class="absolute bottom-[15%] right-[8%] text-[13rem] floating">🛳️</div>
        </div>

        <div class="relative z-10 max-w-5xl">
            <div class="inline-block px-10 py-4 bg-yellow-400 rounded-full shadow-[0_10px_0_#b45309] border-4 border-[#1D4ED8] transform -rotate-2 mb-8 bouncy">
                <span class="text-[#1D4ED8] font-black text-2xl md:text-3xl uppercase tracking-widest font-kids">Juan D. Arosemena Boarding Pass</span>
            </div>
            <h1 class="text-7xl md:text-[10rem] font-black leading-none mb-6 tracking-tighter text-white drop-shadow-[0_15px_0_#1e3a8a]">
                PASSPORT TO THE<br/><span class="text-yellow-300 italic">WORLD!</span>
            </h1>
            <button onclick="startAdventure()" class="bg-green-500 text-white px-16 py-8 rounded-[2.5rem] font-black text-4xl hover:bg-green-600 transition-all shadow-[0_15px_0_#064e3b] border-4 border-white font-kids">
                STAMP PASSPORT 🎟️
            </button>
        </div>

        <div class="absolute bottom-0 left-0 w-full leading-[0]">
            <svg viewBox="0 0 1440 320" class="w-full fill-[#E0F2FE]">
                <path d="M0,224L60,208C120,192,240,160,360,165.3C480,171,600,213,720,213.3C840,213,960,171,1080,154.7C1200,139,1320,149,1380,154.7L1440,160L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
            </svg>
        </div>
    </header>

    <nav id="nav-anchor" class="sticky top-0 z-50 py-10 px-4 bg-white/95 backdrop-blur-xl border-b-8 border-dashed border-blue-500 shadow-2xl">
        <div class="flex justify-center gap-6 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="changeDay('Monday')" id="btn-Monday" class="nav-stamp active bg-blue-500 text-white px-10 py-6 rounded-3xl text-2xl font-black">MONDAY</button>
            <button onclick="changeDay('Tuesday')" id="btn-Tuesday" class="nav-stamp bg-white text-blue-300 px-10 py-6 rounded-3xl text-2xl font-black border-4 border-blue-50">TUESDAY</button>
            <button onclick="changeDay('Wednesday')" id="btn-Wednesday" class="nav-stamp bg-white text-blue-300 px-10 py-6 rounded-3xl text-2xl font-black border-4 border-blue-50">WEDNESDAY</button>
            <button onclick="changeDay('Thursday')" id="btn-Thursday" class="nav-stamp bg-white text-blue-300 px-10 py-6 rounded-3xl text-2xl font-black border-4 border-blue-50">THURSDAY</button>
        </div>
    </nav>

    <main class="container mx-auto px-6 max-w-7xl mt-24 mb-32 text-center">
        <div id="day-stamp-box" class="inline-block p-2 bg-white rounded-[4rem] shadow-2xl transform rotate-1 border-8 border-dashed border-blue-400 mb-20">
            <div class="px-12 py-10">
                <span id="current-country" class="text-xl font-black text-slate-400 uppercase tracking-[0.3em]">Global Station 🌍</span>
                <h2 id="current-title" class="text-4xl md:text-6xl font-black mt-2 text-blue-600">Opening: Passport Check-in! 🛂</h2>
            </div>
        </div>

        <div id="grid-container" class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Content Injected via JS -->
        </div>
    </main>

    <script>
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isMusicPlaying = false;

        const schedule = {
            'Monday': {
                title: "Opening: Passport Check-in! 🛂",
                country: "Global Station 🌍",
                gradient: "from-blue-400 to-blue-600",
                border: "border-blue-400",
                events: [
                    { icon: '✈️', name: 'Opening Ceremony', loc: 'Arrivals Gate' },
                    { icon: '🎫', name: 'Opening Activities', loc: 'Duty Free' },
                    { icon: '❌⭕', name: 'Tic-Tac-Toe', loc: 'Game Lounge' },
                    { icon: '💃', name: 'Dance Performance', loc: 'Stage' },
                    { icon: '⚽', name: 'Ball Control', loc: 'Arena' },
                    { icon: '🎤', name: 'Song Presentation', loc: 'Terminal' },
                    { icon: '🐝', name: 'Spelling Bee', loc: 'Lab' }
                ]
            },
            'Tuesday': {
                title: "Trivia Expedition! 🗺️",
                country: "Discovery Zone 🧭",
                gradient: "from-green-400 to-green-600",
                border: "border-green-400",
                events: [
                    { icon: '🧠', name: 'Trivia Time', loc: 'Classrooms' },
                    { icon: '🤫', name: 'Whisper Game', loc: 'Passage' }
                ]
            },
            'Wednesday': {
                title: "Island of Games! 🏝️",
                country: "Puzzle Peninsula 🧩",
                gradient: "from-yellow-400 to-orange-500",
                border: "border-orange-400",
                events: [
                    { icon: '🎲', name: 'Bingo Word', loc: 'Bingo Bay' },
                    { icon: '🔍', name: 'Memory', loc: 'Recall Reef' },
                    { icon: '📝', name: 'Unscramble', loc: 'Sands' },
                    { icon: '🏆', name: 'Spelling Finals', loc: 'Peak' },
                    { icon: '🌐', name: 'Wordwall', loc: 'Desert' }
                ]
            },
            'Thursday': {
                title: "The Grand World Expo! 🌎",
                country: "Festival Plaza 🎊",
                gradient: "from-purple-500 to-indigo-600",
                border: "border-purple-400",
                events: [
                    { isTwins: true }, // Special Trigger for Twins Day
                    { icon: '🎬', name: 'Musical & Drama', loc: 'Broadway' },
                    { icon: '👨‍🍳', name: 'Kitchen Chemistry', loc: 'Cafe' },
                    { icon: '🗣️', name: 'Speech Contest', loc: 'Plaza' },
                    { icon: '🧪', name: 'Science Expo', loc: 'Innovation' },
                    { icon: '⚡', name: 'Electrostatics', loc: 'Energy Dome' },
                    { icon: '🇵🇹', name: 'Portugal Stand', loc: 'Corner' },
                    { icon: '🇧🇷', name: 'Brazil Stand', loc: 'Corner' },
                    { icon: '🇵🇦', name: 'Panama Stand', loc: 'Corner' },
                    { icon: '👋', name: 'Closing', loc: 'Gate' }
                ]
            }
        };

        function startAdventure() {
            document.getElementById('nav-anchor').scrollIntoView({behavior: 'smooth'});
            if(!isMusicPlaying) toggleMusic();
        }

        function toggleMusic() {
            if (isMusicPlaying) { audio.pause(); musicBtn.innerText = "🔇"; } 
            else { audio.play().catch(() => {}); musicBtn.innerText = "🔊"; }
            isMusicPlaying = !isMusicPlaying;
        }

        function changeDay(day) {
            const current = schedule[day];
            document.getElementById('current-country').innerText = current.country;
            document.getElementById('current-title').innerText = current.title;

            document.querySelectorAll('.nav-stamp').forEach(btn => {
                btn.className = "nav-stamp bg-white text-blue-300 px-10 py-6 rounded-3xl text-2xl font-black border-4 border-blue-50";
            });
            document.getElementById(`btn-${day}`).className = `nav-stamp active bg-blue-500 text-white px-10 py-6 rounded-3xl text-2xl font-black`;

            const container = document.getElementById('grid-container');
            container.innerHTML = current.events.map(ev => {
                if (ev.isTwins) {
                    return `
                        <div onclick="window.location.href='twins.html'" class="ticket-card twins-link-card group">
                            <div class="twins-image-container">
                                <img src="https://i.pinimg.com/736x/b1/6c/14/b16c1427800fbf001d15e345fee9c02f.jpg" alt="Twins Day Poster" class="w-full h-auto">
                            </div>
                            <h3 class="text-3xl font-black text-pink-500 uppercase italic">Twins Day 👯</h3>
                            <p class="text-slate-400 font-bold mt-2">Click to open ticket!</p>
                        </div>
                    `;
                }
                return `
                    <div class="ticket-card">
                        <div class="text-[8rem] mb-4 bouncy">${ev.icon}</div>
                        <h3 class="text-3xl font-black text-blue-900 uppercase tracking-tighter">${ev.name}</h3>
                        <div class="mt-4 pt-4 border-t-2 border-dotted border-blue-100 w-full text-blue-500 font-black">🛫 ${ev.loc}</div>
                    </div>
                `;
            }).join('');
        }

        changeDay('Monday');
    </script>
</body>
</html>
