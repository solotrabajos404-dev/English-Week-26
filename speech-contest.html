<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Speech Contest</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#F8FAFF,#FFFFFF)}.back-btn{position:fixed;top:1rem;left:1rem;background:white;padding:.6rem 1rem;border-radius:9999px;border:3px solid #dbeafe;display:flex;gap:.5rem;align-items:center;text-decoration:none;font-weight:900;color:#1e40af}.poster{width:100%;max-width:820px;margin:0 auto;display:block;border-radius:1rem;box-shadow:0 18px 50px rgba(2,6,23,.06);border:6px solid #c7d2fe}</style>
</head>
<body>
  <a href="index.html" class="back-btn">⬅️ Back</a>
  <header class="py-10 text-center"><h1 class="text-3xl font-black text-indigo-700">Speech Contest 🗣️</h1><p class="text-slate-600">Short speeches in English — clear and confident!</p></header>
  <section class="max-w-4xl mx-auto px-4">
    <img src="speech.png" alt="Speech contest poster" style="width:100%;border-radius:1rem;box-shadow:0 18px 50px rgba(2,6,23,.06);border:6px solid #c7d2fe">
    <div class="bg-white p-6 rounded-2xl shadow-md mt-6">
      <h2 class="font-black">Tips for speakers</h2>
      <ul class="mt-3 text-slate-700 space-y-2"><li>• Speak slowly and clearly.</li><li>• Use simple English sentences.</li><li>• Smile and enjoy the moment.</li></ul>
    </div>
  </section>
  <footer class="mt-12 py-8 bg-blue-900 text-white text-center">CEB Juan D. Arosemena</footer>
</body>
</html>
