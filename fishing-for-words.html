<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Fishing for Words — English Week</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#FEF6F8,#FFFFFF)}.back-btn{position:fixed;top:1rem;left:1rem;background:white;padding:.6rem 1rem;border-radius:9999px;border:3px solid #fee2e2;display:flex;gap:.5rem;align-items:center;text-decoration:none;font-weight:900;color:#9f1239}.poster{width:100%;max-width:840px;border-radius:1rem;margin:0 auto;display:block;box-shadow:0 20px 50px rgba(2,6,23,.06);border:6px solid #a78bfa}</style>
</head>
<body>
  <a href="index.html" class="back-btn">⬅️ Back</a>
  <header class="py-10 text-center">
    <h1 class="text-3xl font-black text-pink-600">Fishing for Words 🎣</h1>
    <p class="text-slate-600">Catch the correct word and win a sticker!</p>
  </header>

  <section class="max-w-4xl mx-auto px-4">
    <img src="fishing.png" alt="Fishing for words poster" class="poster">
    <div class="bg-white p-6 rounded-2xl shadow-md mt-6">
      <h2 class="font-black">Game rules</h2>
      <ul class="mt-3 text-slate-700 space-y-2">
        <li>• Each child fishes for a card with a word.</li>
        <li>• Say the word in English and use it in a short sentence.</li>
        <li>• Correct answers win a sticker; encourage each other!</li>
      </ul>
    </div>
  </section>

  <footer class="mt-12 py-8 bg-blue-900 text-white text-center">CEB Juan D. Arosemena — English Week 2026</footer>
</body>
</html>
