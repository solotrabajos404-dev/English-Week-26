<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Spin the Wheel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>body{font-family:'Nunito',sans-serif;background:linear-gradient(180deg,#FFF7ED,#FFFFFF)}.back-btn{position:fixed;top:1rem;left:1rem;background:white;padding:.6rem 1rem;border-radius:9999px;border:3px solid #ffedd5;display:flex;gap:.5rem;align-items:center;text-decoration:none;font-weight:900;color:#92400e}.poster{width:100%;max-width:820px;margin:0 auto;display:block;border-radius:1rem;box-shadow:0 18px 50px rgba(2,6,23,.06);border:6px solid #fed7aa}</style>
</head>
<body>
  <a href="index.html" class="back-btn">⬅️ Back</a>
  <header class="py-10 text-center"><h1 class="text-3xl font-black text-amber-700">Spin the Wheel 🌀</h1><p class="text-slate-600">Spin for prizes and English tasks!</p></header>
  <section class="max-w-4xl mx-auto px-4">
    <img src="spinthe.png" alt="Spin the Wheel poster" style="width:100%;border-radius:1rem;box-shadow:0 18px 50px rgba(2,6,23,.06);border:6px solid #fed7aa">
    <div class="bg-white p-6 rounded-2xl shadow-md mt-6">
      <h2 class="font-black">What happens</h2>
      <p class="mt-3 text-slate-700">Spin the wheel and complete the task it lands on — small prizes for participation.</p>
    </div>
  </section>
  <footer class="mt-12 py-8 bg-blue-900 text-white text-center">CEB Juan D. Arosemena</footer>
</body>
</html>
