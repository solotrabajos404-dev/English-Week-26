<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tic-Tac-Toe — Game Lounge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>body{font-family:'Nunito',sans-serif;background:#F8FDFF}.back-btn{position:fixed;top:1rem;left:1rem;background:white;padding:.6rem 1rem;border-radius:9999px;border:3px solid #dbeafe;display:flex;gap:.5rem;align-items:center;text-decoration:none;font-weight:900;color:#1e40af}.poster{width:100%;max-width:780px;border-radius:1rem;border:6px solid #fff;display:block;margin:0 auto;box-shadow:0 18px 50px rgba(2,6,23,.06)}</style>
</head>
<body>
  <a href="index.html" class="back-btn">⬅️ Back</a>
  <header class="py-10 text-center">
    <h1 class="text-3xl font-black text-blue-900">Tic-Tac-Toe ❌⭕</h1>
    <p class="text-slate-600 mt-2">Play partner Tic-Tac-Toe using English words!</p>
  </header>

  <section class="max-w-4xl mx-auto px-4">
    <img src="tictactoe.png" alt="Tic-Tac-Toe poster" class="poster">
    <div class="bg-white p-6 rounded-2xl shadow-md mt-6">
      <h2 class="font-black">How to play</h2>
      <ol class="mt-3 text-slate-700 list-decimal list-inside space-y-2">
        <li>Find a partner and pick X or O.</li>
        <li>To mark a square, say an English word from the vocabulary list.</li>
        <li>Three in a row wins — celebrate with a sticker!</li>
      </ol>
    </div>
  </section>

  <footer class="mt-12 py-6 bg-blue-900 text-white text-center">Passport Adventure 2026</footer>
</body>
</html>
